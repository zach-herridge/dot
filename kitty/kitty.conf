include current-theme.conf

font_family      JetBrains Mono
font_size        15.0

window_padding_width 20 0 0 10
background #202020
background_blur 20

cursor_blink_interval 0

mouse_hide_wait 3.0

macos_option_as_alt yes
macos_titlebar_color background

tab_bar_edge top
tab_bar_min_tabs 1
tab_bar_style separator
tab_separator " "
tab_title_template " {index}: {title} "
tab_title_max_length 20

tab_bar_background #202020

active_tab_background #6b4c9a
active_tab_foreground #ffffff
active_tab_font_style normal
inactive_tab_background #202020
inactive_tab_foreground #808080

enabled_layouts splits,stack

# Dim inactive windows
inactive_text_alpha 0.4

map ctrl+h neighboring_window left
map ctrl+j neighboring_window down
map ctrl+k neighboring_window up
map ctrl+l neighboring_window right

map ctrl+a>\ launch --location=hsplit
map ctrl+a>| launch --location=vsplit

map cmd+alt+h resize_window wider 2
map cmd+alt+j resize_window shorter 2
map cmd+alt+k resize_window taller 2
map cmd+alt+l resize_window narrower 2

map ctrl+a>z toggle_layout stack

map ctrl+a>t new_tab
map ctrl+a>w close_tab

map ctrl+a>1 goto_tab 1
map ctrl+a>2 goto_tab 2
map ctrl+a>3 goto_tab 3
map ctrl+a>4 goto_tab 4
map ctrl+a>5 goto_tab 5
map ctrl+a>6 goto_tab 6
map ctrl+a>7 goto_tab 7
map ctrl+a>8 goto_tab 8
map ctrl+a>9 goto_tab 9


allow_remote_control yes
listen_on unix:/tmp/kitty
action_alias kitty_scrollback_nvim kitten ~/.local/share/nvim/lazy/kitty-scrollback.nvim/python/kitty_scrollback_nvim.py
map ctrl+a>v kitty_scrollback_nvim
map ctrl+u kitten conditional.py
