# Kitty SSH kitten configuration
# Applied when connecting via: kitten ssh (aliased as 's')

# Propagate COLORTERM so remote tools know true-color is available
env COLORTERM=truecolor

# Shell integration: enables prompt markers, command tracking,
# and the 'kitten' command on the remote (clipboard, transfer, etc.)
shell_integration inherited

# Transfer confirmation: don't prompt for small transfers
# (skip the "allow this transfer?" dialog)
share_connections yes
