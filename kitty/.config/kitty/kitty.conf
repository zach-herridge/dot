include current-theme.conf

font_family      JetBrains Mono
font_size        15.0

window_padding_width 20 0 0 10
background #202020
background_blur 20

cursor_blink_interval 0

mouse_hide_wait 3.0

macos_option_as_alt yes
macos_titlebar_color background

# No tabs/splits — tmux handles all of that now
tab_bar_min_tabs 999

# Allow OSC 52 clipboard access (for tmux-yank, neovim, etc.)
clipboard_control write-clipboard write-primary read-clipboard read-primary

# Allow remote control for any remaining kitty-scrollback usage (local only)
allow_remote_control yes
listen_on unix:/tmp/kitty

# Pass all keys through to tmux — no kitty-level interception
# Clear every keybinding that would conflict with tmux
clear_all_shortcuts yes

# Only keep essential macOS shortcuts
map cmd+c copy_to_clipboard
map cmd+v paste_from_clipboard
map cmd+q quit
map cmd+n new_os_window
map cmd+w close_os_window
map cmd+plus change_font_size all +1.0
map cmd+minus change_font_size all -1.0
map cmd+0 change_font_size all 0
map cmd+f toggle_fullscreen
