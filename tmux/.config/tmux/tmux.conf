# ─── Prefix ───────────────────────────────────────────────────────────────────
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix
unbind C-z

# ─── Terminal / True Color ────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-256color:Tc,alacritty:Tc,xterm-kitty:Tc"
set -as terminal-features ",xterm-256color:RGB,xterm-kitty:RGB"

# ─── General ──────────────────────────────────────────────────────────────────
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g automatic-rename on
set -g status-interval 1
set -g mouse off
set -sg escape-time 0
set -g display-time 1000
set -g repeat-time 300
set -g focus-events on
set -g history-limit 50000

# ─── Inactive Pane Dimming ────────────────────────────────────────────────────
# Note: only dims text using the default foreground color. ANSI-colored text
# (prompts, ls output, syntax highlighting) retains its color in inactive panes.
set -g window-style 'fg=colour245'
set -g window-active-style 'fg=terminal'

# ─── Splits (matching Kitty: \ and | = hsplit, - = vsplit) ───────────────────
unbind %
unbind '"'
bind \\ split-window -h -c "#{pane_current_path}"
bind |  split-window -h -c "#{pane_current_path}"
bind -  split-window -v -c "#{pane_current_path}"

# ─── Pane Zoom (ctrl+a>z like Kitty's stack toggle) ──────────────────────────
bind z resize-pane -Z

# ─── Pane Resize (prefix + h/j/k/l) ──────────────────────────────────────────
bind -r h resize-pane -L 5
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5

# ─── Windows / Tabs (matching Kitty tab keybindings) ──────────────────────────
bind t new-window -c "#{pane_current_path}"
bind w confirm-before -p "Close window? (y/n)" kill-window
bind W choose-tree -Zw
bind 1 select-window -t :1
bind 2 select-window -t :2
bind 3 select-window -t :3
bind 4 select-window -t :4
bind 5 select-window -t :5
bind 6 select-window -t :6
bind 7 select-window -t :7
bind 8 select-window -t :8
bind 9 select-window -t :9
bind i command-prompt -I "#W" "rename-window '%%'"
bind , swap-window -t -1\; select-window -t -1
bind . swap-window -t +1\; select-window -t +1

# ─── Clipboard (OSC 52 — works locally AND over SSH) ──────────────────────────
# `on` lets tmux both SET the outer terminal's clipboard (kitty/Ghostty relay
# it to the local Mac clipboard via OSC 52) and accept OSC 52 from apps inside.
# This is what makes copy work on a REMOTE host with no pbcopy/xclip installed.
set -g set-clipboard on
# Let apps inside tmux (nvim's OSC 52 provider, etc.) pass escapes through tmux.
set -g allow-passthrough on

# ─── Vi Mode Copy ────────────────────────────────────────────────────────────
setw -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
# No pbcopy on Linux — copy-pipe-and-cancel with no command lets tmux's
# set-clipboard (OSC 52) ship the selection to the local terminal clipboard.
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel
bind-key -T copy-mode-vi 'Enter' send -X copy-pipe-and-cancel

# ─── Scrollback / Claude Viewer ──────────────────────────────────────────────
# ctrl+a>v = open scrollback/claude viewer in nvim popup (matches Kitty binding)
bind v run-shell -b "~/.config/tmux/scripts/scrollback-nvim.sh auto"

# ctrl+u (no prefix) = smart: vim gets C-u, else opens scrollback/claude viewer
# Uses the vim-tmux-navigator if-shell pattern for zero-latency vim detection
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?)(diff)?$'"
bind -n C-u if-shell "$is_vim" "send-keys C-u" "run-shell -b '~/.config/tmux/scripts/scrollback-nvim.sh auto'"

# ─── Pane Navigation (Ctrl+h/j/k/l, seamless with vim) ───────────────────────
# Inlined vim-tmux-navigator logic so it works even if TPM never cloned the
# plugin. If the focused pane is running vim/nvim, forward the key so vim moves
# between its splits; otherwise move between tmux panes. ($is_vim defined above.)
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# ─── Hints (file, git hash, url, line) ───────────────────────────────────────
# Launched in popups so fzf has a proper terminal.
# Pass TMUX_PANE so the script captures from the triggering pane, not the popup.
bind f popup -E -w 80% -h 50% -e "TMUX_PANE=#{pane_id}" "~/.config/tmux/scripts/hints.sh path"
bind g popup -E -w 80% -h 50% -e "TMUX_PANE=#{pane_id}" "~/.config/tmux/scripts/hints.sh hash"
bind u popup -E -w 80% -h 50% -e "TMUX_PANE=#{pane_id}" "~/.config/tmux/scripts/hints.sh url"
bind y popup -E -w 80% -h 50% -e "TMUX_PANE=#{pane_id}" "~/.config/tmux/scripts/hints.sh line"

# ─── Plugins ─────────────────────────────────────────────────────────────────
# Pin the install path so TPM, catppuccin, and setup.sh all agree. Without this
# TPM defaults to ~/.tmux/plugins/ while catppuccin is loaded from
# ~/.config/tmux/plugins/, so plugins land in one place and are loaded from the
# other — which is why vim-tmux-navigator/tmux-yank silently went missing.
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.config/tmux/plugins/"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'

# ─── Catppuccin Theme ─────────────────────────────────────────────────────────
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_default_text " #{b:pane_current_path}"
set -g @catppuccin_window_text " #{b:pane_current_path}"
set -g @catppuccin_window_current_text " #{b:pane_current_path}"

run '~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux'

# Post-catppuccin overrides (must come AFTER the plugin runs)
set -g status-position top
set -g status-style 'bg=default'
set -g status-right ""
set -g status-left ""
set -g status 2
set -g status-format[1] ''

# ─── TPM (keep at very end) ──────────────────────────────────────────────────
run '~/.tmux/plugins/tpm/tpm'
